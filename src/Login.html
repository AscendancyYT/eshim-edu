<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Login to Eshim Edu and unlock your full learning potential."
    />
    <meta name="keywords" content="Eshim Edu, education, login, motivation" />
    <meta name="author" content="Eshim Edu Team" />
    <title>Eshim Edu - Login</title>
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="icon" href="../styles/images/logo.png">
  </head>
  <body>
    <div class="lang-switcher">
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('ru')">RU</button>
      <button onclick="setLang('uz')">UZ</button>
    </div>
    <div class="box">
      <h2 id="title">Welcome to Eshim Edu</h2>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <div class="btn-row">
        <button class="login" onclick="login()" id="loginBtn">Login</button>
        <button class="signup" onclick="signup()" id="signupBtn">
          Sign Up
        </button>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="../functions/login.js"></script>
  </body>
</html>
