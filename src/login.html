<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eshim Edu Eclipse</title>
  <link rel="stylesheet" href="../styles/login.css">
  <link rel="icon" href="../styles/images/logo.png">
</head>
<body>
  <form class="login-form">
    <h2>Login</h2>
    <input type="email" class="emailInput" placeholder="Email" required>
    <input type="password" class="passwordInput" placeholder="Password" required>
    <button type="submit">Login</button>
    <p>Don't have an account? <a href="index.html">Sign Up</a></p>
  </form>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="../functions/login.js"></script>
</body>
</html>
